<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#040D1A">
<title>Vigía de Integridad — Acceso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Source+Sans+3:wght@400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Source Sans 3',sans-serif;
  background:#040D1A;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  position:relative;
  overflow:hidden;
}
/* Animated background grid */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(0,184,212,.04) 40px,rgba(0,184,212,.04) 41px),
    repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(0,184,212,.04) 40px,rgba(0,184,212,.04) 41px);
  pointer-events:none;
}
body::after{
  content:'';
  position:fixed;
  width:600px;height:600px;
  background:radial-gradient(circle,rgba(0,184,212,.06) 0%,transparent 70%);
  top:-200px;right:-200px;
  pointer-events:none;
  animation:drift 12s ease-in-out infinite;
}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,30px)}}

.card{
  background:linear-gradient(135deg,#0A1F38 0%,#071628 100%);
  border:1px solid rgba(0,184,212,.25);
  border-radius:16px;
  padding:36px 32px;
  width:100%;
  max-width:380px;
  box-shadow:0 24px 64px rgba(0,0,0,.7),0 0 40px rgba(0,184,212,.1);
  position:relative;
  z-index:1;
  animation:slideUp .4s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.card::before{
  content:'';
  position:absolute;top:0;left:20%;right:20%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,184,212,.5),transparent);
}

.shield{
  width:64px;height:64px;
  background:linear-gradient(135deg,#C62828,#8B0000);
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;
  box-shadow:0 0 30px rgba(198,40,40,.4);
  animation:shieldPulse 4s ease-in-out infinite;
}
@keyframes shieldPulse{0%,100%{box-shadow:0 0 30px rgba(198,40,40,.4)}50%{box-shadow:0 0 44px rgba(239,83,80,.6)}}

.title{
  font-family:'Rajdhani',sans-serif;
  font-size:22px;font-weight:700;
  color:#fff;text-align:center;
  letter-spacing:1.5px;text-transform:uppercase;
  margin-bottom:4px;
}
.subtitle{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;color:rgba(0,184,212,.8);
  text-align:center;letter-spacing:1.5px;
  text-transform:uppercase;margin-bottom:28px;
}

.fld{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.fld label{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;color:rgba(0,184,212,.7);
  text-transform:uppercase;letter-spacing:1px;
}
.fld input{
  background:rgba(0,0,0,.5);
  border:1px solid rgba(0,184,212,.2);
  border-radius:8px;
  padding:12px 14px;
  font-size:15px;
  color:#F0F4FF;
  font-family:'Source Sans 3',sans-serif;
  width:100%;
  transition:border-color .2s,box-shadow .2s;
  -webkit-appearance:none;
}
.fld input:focus{
  outline:none;
  border-color:rgba(0,184,212,.6);
  box-shadow:0 0 0 3px rgba(0,184,212,.12),0 0 16px rgba(0,184,212,.15);
}

.btn-login{
  width:100%;
  background:linear-gradient(135deg,#1565C0,#0D47A1);
  color:#fff;border:1px solid rgba(21,101,192,.5);
  padding:14px;border-radius:9px;
  font-size:15px;font-weight:600;
  font-family:'Rajdhani',sans-serif;
  letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;margin-top:8px;
  box-shadow:0 4px 20px rgba(21,101,192,.4);
  transition:all .2s;
  position:relative;overflow:hidden;
}
.btn-login::before{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.08),transparent);
}
.btn-login:hover{box-shadow:0 4px 28px rgba(21,101,192,.6);transform:translateY(-1px)}
.btn-login:active{transform:translateY(0) scale(.99)}
.btn-login:disabled{background:rgba(255,255,255,.05);color:rgba(255,255,255,.3);box-shadow:none;cursor:not-allowed}

.error-box{
  background:rgba(198,40,40,.12);
  border:1px solid rgba(239,83,80,.35);
  border-left:3px solid #EF5350;
  border-radius:0 7px 7px 0;
  padding:10px 13px;
  font-size:13px;color:#FFCDD2;
  margin-bottom:14px;display:none;
  line-height:1.4;
}
.footer-note{
  margin-top:22px;padding-top:16px;
  border-top:1px solid rgba(0,184,212,.1);
  text-align:center;
  font-family:'JetBrains Mono',monospace;
  font-size:10px;color:rgba(142,171,200,.4);
  letter-spacing:.5px;line-height:1.7;
}
.spinner{
  display:none;
  width:16px;height:16px;
  border:2px solid rgba(255,255,255,.2);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .7s linear infinite;
  margin:0 auto;
}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-text{display:block}
</style>
</head>
<body>
<div class="card">
  <div class="shield">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2L4 6v6c0 5.5 3.8 10.7 8 12 4.2-1.3 8-6.5 8-12V6L12 2z"/>
      <polyline points="9 12 11 14 15 10"/>
    </svg>
  </div>
  <div class="title">Vigía de Integridad</div>
  <div class="subtitle">Sub-Prefectura · Urubamba · Cusco</div>

  <div class="error-box" id="err-box"></div>

  <div class="fld">
    <label>Usuario</label>
    <input type="text" id="usr" placeholder="jmpozo" autocomplete="username"
      autocapitalize="none" autocorrect="off" spellcheck="false">
  </div>
  <div class="fld">
    <label>Contraseña</label>
    <input type="password" id="pwd" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn-login" id="btn-login" onclick="doLogin()">
    <span class="btn-text">Ingresar al sistema</span>
    <div class="spinner" id="spin"></div>
  </button>

  <div class="footer-note">
    VIGIA-URB-2026-JMPC<br>
    Sistema de Auditoría con IA<br>
    Acceso restringido — Solo personal autorizado
  </div>
</div>

<script>
document.addEventListener('keydown', e => {
  if(e.key === 'Enter') doLogin();
});
// Auto-focus username
window.addEventListener('load', () => {
  document.getElementById('usr').focus();
});

async function doLogin(){
  const usr = document.getElementById('usr').value.trim();
  const pwd = document.getElementById('pwd').value;
  const err = document.getElementById('err-box');
  const btn = document.getElementById('btn-login');
  const spin= document.getElementById('spin');

  if(!usr || !pwd){
    showError('Ingresa tu usuario y contraseña.');
    return;
  }

  btn.disabled = true;
  document.querySelector('.btn-text').style.display = 'none';
  spin.style.display = 'block';
  err.style.display  = 'none';

  try{
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username: usr, password: pwd})
    });
    const d = await r.json();
    if(d.ok){
      // Redirect to main app
      window.location.href = '/';
    } else {
      showError(d.msg || 'Usuario o contraseña incorrectos.');
    }
  } catch(e){
    showError('Error de conexión. Verifica que el servidor esté activo.');
  }

  btn.disabled = false;
  document.querySelector('.btn-text').style.display = 'block';
  spin.style.display = 'none';
}

function showError(msg){
  const e = document.getElementById('err-box');
  e.textContent = msg;
  e.style.display = 'block';
  // Shake animation
  e.style.animation = 'none';
  setTimeout(() => e.style.animation = '', 10);
  document.getElementById('pwd').value = '';
  document.getElementById('pwd').focus();
}
</script>
</body>
</html>
